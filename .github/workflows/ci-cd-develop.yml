name: Pipeline CI/CD - Entorno Develop (Optimizado con Caché)

# 1. ADAPTACIÓN DE TRIGGERS: Solo se ejecuta en la rama develop
on:
  push:
    branches: [ "develop" ]

jobs:
  # ==========================================
  # FASE 1: Integración Continua (CI)
  # ==========================================
  ci-validation:
    name: Validación del Código (CI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js v20 y Caché
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 5.2. CACHÉ DE DEPENDENCIAS: Guarda la carpeta de npm
          cache: 'npm' 

      - name: Instalar dependencias
        run: npm ci

      - name: Verificación de Compliance (Seguridad)
        run: npm audit

      - name: Ejecución de Pruebas Unitarias
        run: npm test

  # ==========================================
  # FASE 2: Despliegue Continuo (CD)
  # ==========================================
  cd-deployment:
    name: Contenerización y Registro ECR (CD)
    needs: ci-validation
    # 2. ADAPTACIÓN DE CONDICIONALES: No ejecutar si es un Pull Request
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Preparar el motor de Docker para la caché avanzada
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir, etiquetar y subir imagen con Caché de Capas
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: duoc-lab
          IMAGE_TAG: develop-${{ github.sha }}
          LATEST_TAG: develop-latest
        # 5.3. CACHÉ DE CAPAS DOCKER: Usa --cache-from y --cache-to
        run: |
          docker buildx build \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG \
            --cache-from type=registry,ref=$ECR_REGISTRY/$ECR_REPOSITORY:$LATEST_TAG \
            --cache-to type=inline \
            .
